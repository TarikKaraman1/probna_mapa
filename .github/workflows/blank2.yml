            - name: Schedule Workflow
  # You may pin to the exact commit or the version.
  # uses: austenstone/schedule@e5a5e92bfb7cbfdc7f46f569638279f45e825145
  uses: austenstone/schedule@v1.3
  with:
    # The GitHub token used to create an authenticated client
    github-token: # optional, default is ${{ github.token }}
    # Workflow to run at schedule time
    workflow: 
    # Date to run the workflow
    date: # optional, default is ${{ github.event.inputs.date }}
    # Milliseconds to wait
    wait-ms: # optional, default is 0
    # Milliseconds to wait between checks on the schedule
    wait-delay-ms: # optional, default is 20000
    # Branch to run the workflow on
    ref: # optional, default is ${{ github.ref }}
    # Optional repository owner to run the workflow on.
    owner: # optional, default is ${{ github.repository_owner }}
    # Optional repository name to run the workflow on.
    repo: # optional, default is ${{ github.repository }}
    # Timezone to use for the schedule
    timezone: # optional, default is US/Eastern
    # Inputs to pass to the workflow
    inputs: # optional, default is ${{ toJson(github.event.inputs) }}
    # Inputs to ignore when passing to the workflow
    inputs-ignore: # optional, default is date,workflow
          
